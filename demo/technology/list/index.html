<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章列表 - Bryan Yang's Blog</title>
    
    <!-- Busuanzi 不蒜子统计 -->
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-pink: #FFB3D9;
            --primary-blue: #B4E4FF;
            --primary-purple: #E5D4FF;
            --cream-white: #FFF8F0;
            --soft-shadow: rgba(255, 179, 217, 0.3);
            --text-dark: #5C5470;
            --text-light: #9D9D9D;
            --green-status: #7FE9A7;
            --card-bg: rgba(255, 255, 255, 0.85);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #FFE5F1 0%, #E0F4FF 50%, #F5E6FF 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            padding-top: 40px;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景动画泡泡 */
        .bubble {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), rgba(255, 179, 217, 0.3));
            animation: float 20s infinite ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        .bubble:nth-child(1) {
            width: 80px;
            height: 80px;
            left: 10%;
            top: 20%;
            animation-delay: 0s;
        }

        .bubble:nth-child(2) {
            width: 60px;
            height: 60px;
            right: 15%;
            top: 60%;
            animation-delay: 3s;
        }

        .bubble:nth-child(3) {
            width: 100px;
            height: 100px;
            left: 80%;
            top: 30%;
            animation-delay: 6s;
        }

        .bubble:nth-child(4) {
            width: 50px;
            height: 50px;
            left: 20%;
            bottom: 20%;
            animation-delay: 9s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.5;
            }
            25% {
                transform: translateY(-30px) translateX(20px) scale(1.1);
                opacity: 0.7;
            }
            50% {
                transform: translateY(-60px) translateX(-20px) scale(0.9);
                opacity: 0.5;
            }
            75% {
                transform: translateY(-30px) translateX(-30px) scale(1.05);
                opacity: 0.6;
            }
        }

        /* 主容器 */
        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 
                0 20px 60px rgba(255, 179, 217, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.8) inset;
            position: relative;
            z-index: 1;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--text-dark);
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header-desc {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* 排序按钮 */
        .sort-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .sort-btn {
            padding: 8px 16px;
            border: 2px solid var(--primary-blue);
            background: white;
            color: var(--text-dark);
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .sort-btn:hover {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-purple));
            color: white;
            border-color: var(--primary-purple);
            transform: translateY(-2px);
        }

        .sort-btn.active {
            background: linear-gradient(135deg, var(--primary-pink), var(--primary-purple));
            color: white;
            border-color: var(--primary-pink);
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 179, 217, 0.3);
            border-top-color: var(--primary-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 文章列表 */
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .article-item {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 2px 10px rgba(180, 228, 255, 0.15);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border-left: 4px solid transparent;
        }

        .article-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 20px rgba(255, 179, 217, 0.25);
            border-left-color: var(--primary-pink);
        }

        .article-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 8px;
        }

        .article-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            flex: 1;
            word-break: break-word;
        }

        .article-badge {
            background: linear-gradient(135deg, var(--primary-pink), var(--primary-purple));
            color: white;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--text-light);
            flex-wrap: wrap;
        }

        .article-size {
            background: rgba(180, 228, 255, 0.3);
            padding: 2px 8px;
            border-radius: 8px;
        }

        .article-date {
            background: rgba(255, 179, 217, 0.2);
            padding: 2px 8px;
            border-radius: 8px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-text {
            margin-bottom: 10px;
        }

        /* 统计信息 */
        .stats {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, rgba(255, 179, 217, 0.1), rgba(180, 228, 255, 0.1));
            border-radius: 15px;
            font-size: 13px;
            color: var(--text-light);
        }

        .stats-number {
            color: var(--primary-pink);
            font-weight: 700;
            font-size: 18px;
        }

        /* 返回按钮 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: white;
            border: 2px solid var(--primary-blue);
            color: var(--text-dark);
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-purple));
            color: white;
            border-color: var(--primary-purple);
            transform: translateY(-2px);
        }

        /* 初音未来装饰 */
        .miku-decoration {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 280px;
            height: 280px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
            animation: float-miku 4s infinite ease-in-out;
        }

        @keyframes float-miku {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            25% {
                transform: translateY(-15px) rotate(5deg);
            }
            50% {
                transform: translateY(-30px) rotate(0deg);
            }
            75% {
                transform: translateY(-15px) rotate(-5deg);
            }
        }

        .miku-decoration:hover {
            transform: scale(1.2) rotate(10deg) !important;
        }

        .miku-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 25px rgba(57, 197, 187, 0.4)) 
                    brightness(1.05) contrast(1.1)
                    drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
            image-rendering: crisp-edges;
        }

        /* 音符装饰 */
        .music-note {
            position: absolute;
            font-size: 24px;
            opacity: 0;
            animation: noteFloat 3s ease-in-out;
            pointer-events: none;
        }

        @keyframes noteFloat {
            0% {
                opacity: 0;
                transform: translateY(0) rotate(0deg);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) rotate(360deg);
            }
        }

        /* Toast 通知 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--green-status), #5FD068);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(127, 233, 167, 0.4);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 2000;
            font-size: 14px;
        }

        .toast.show {
            transform: translateX(0);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
                border-radius: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .article-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .article-badge {
                align-self: flex-start;
            }

            .miku-decoration {
                width: 120px;
                height: 120px;
                bottom: 10px;
                right: 10px;
            }

            .bubble {
                display: none;
            }

            .sort-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景泡泡 -->
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <!-- 主容器 -->
    <div class="container">
        <a href="https://dazuizui.github.io/ZuiBlog2/" class="back-btn">← 返回首页</a>

        <div class="header">
            <h1 id="pageTitle">📚 技术文章</h1>
            <p class="header-desc" id="pageDescription">分享技术知识和开发经验</p>
        </div>

        <!-- 排序控制 -->
        <div class="sort-controls">
            <button class="sort-btn active" data-sort="newest">最新优先</button>
            <button class="sort-btn" data-sort="oldest">最旧优先</button>
            <button class="sort-btn" data-sort="name">按名称</button>
        </div>

        <!-- 文章列表 -->
        <div id="articleList" class="article-list">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载文章列表...</p>
            </div>
        </div>

        <!-- 统计信息 -->
        <div class="stats" id="stats" style="display: none;">
            <p>共有 <span class="stats-number" id="articleCount">0</span> 篇内容</p>
        </div>
    </div>

    <!-- 初音未来装饰 -->
    <div class="miku-decoration" onclick="mikuClick()">
        <img src="https://raw.githubusercontent.com/DaZuiZui/ZuiBlog2/main/image/HatsuneMikuSekai.png" alt="Miku" class="miku-img" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
        <!-- 备用占位 -->
        <div style="display: none; width: 100%; height: 100%; background: linear-gradient(135deg, #FFB3D9, #E5D4FF); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 60px;">♪</div>
    </div>

    <!-- Toast 通知 -->
    <div class="toast" id="toast"></div>

    <script>
        const DEFAULT_CONFIG = {
            repoOwner: 'DaZuiZui',
            repoName: 'ZuiBlog2',
            repoPath: 'blog/technology',
            listTitle: '技术文章',
            listEmoji: '📚',
            listDescription: '分享技术知识和开发经验',
            readerTitle: '文章阅读',
            welcomeMessage: '欢迎来到技术文章列表！'
        };

        let articles = [];
        let currentSort = 'newest';

        function getQueryParam(param) {
            const params = new URLSearchParams(window.location.search);
            return params.get(param);
        }

        function getConfig() {
            return {
                ...DEFAULT_CONFIG,
                repoPath: getQueryParam('repoPath') || DEFAULT_CONFIG.repoPath,
                listTitle: getQueryParam('listTitle') || DEFAULT_CONFIG.listTitle,
                listEmoji: getQueryParam('listEmoji') || DEFAULT_CONFIG.listEmoji,
                listDescription: getQueryParam('listDescription') || DEFAULT_CONFIG.listDescription,
                readerTitle: getQueryParam('readerTitle') || DEFAULT_CONFIG.readerTitle,
                welcomeMessage: getQueryParam('welcomeMessage') || DEFAULT_CONFIG.welcomeMessage
            };
        }

        const pageConfig = getConfig();

        function buildSearchParams(extraParams = {}) {
            const params = new URLSearchParams({
                repoPath: pageConfig.repoPath,
                listTitle: pageConfig.listTitle,
                listEmoji: pageConfig.listEmoji,
                listDescription: pageConfig.listDescription,
                readerTitle: pageConfig.readerTitle,
                welcomeMessage: pageConfig.welcomeMessage,
                ...extraParams
            });
            return params;
        }

        function escapeHtml(value) {
            return value
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function applyPageMeta() {
            document.title = `${pageConfig.listTitle} - Bryan Yang's Blog`;
            document.getElementById('pageTitle').textContent = `${pageConfig.listEmoji} ${pageConfig.listTitle}`;
            document.getElementById('pageDescription').textContent = pageConfig.listDescription;
        }

        // 从GitHub API获取文件列表
        async function fetchArticles() {
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${pageConfig.repoOwner}/${pageConfig.repoName}/contents/${pageConfig.repoPath}`,
                    {
                        headers: {
                            'Accept': 'application/vnd.github.v3+raw',
                            'User-Agent': 'ZuiBlog-Reader'
                        },
                        cache: 'default'
                    }
                );

                if (!response.ok) {
                    if (response.status === 403) {
                        throw new Error('API速率限制，请稍后重试');
                    } else if (response.status === 404) {
                        throw new Error(`内容目录不存在：${pageConfig.repoPath}`);
                    }
                    throw new Error('Failed to fetch articles');
                }

                const data = await response.json();
                
                // 筛选markdown文件
                articles = data
                    .filter(item => item.type === 'file' && (item.name.endsWith('.md') || item.name.endsWith('.MD')))
                    .map(item => ({
                        name: item.name,
                        title: item.name.replace(/\.md$/i, ''),
                        url: item.html_url,
                        size: item.size,
                        downloadUrl: item.download_url
                    }));

                // 获取每个文件的创建时间（通过Git commits）
                await enrichWithDates();
                
                renderArticles();
                showStats();
            } catch (error) {
                console.error('Error fetching articles:', error);
                showError('加载文章失败：' + error.message);
            }
        }

        // 获取文件的创建日期
        async function enrichWithDates() {
            for (let article of articles) {
                try {
                    const response = await fetch(
                        `https://api.github.com/repos/${pageConfig.repoOwner}/${pageConfig.repoName}/commits?path=${encodeURIComponent(`${pageConfig.repoPath}/${article.name}`)}&per_page=1`,
                        {
                            headers: {
                                'User-Agent': 'ZuiBlog-Reader'
                            },
                            cache: 'default'
                        }
                    );
                    
                    if (response.ok) {
                        const commits = await response.json();
                        if (commits.length > 0) {
                            // 获取最早的提交时间作为创建时间
                            article.date = new Date(commits[commits.length - 1].commit.author.date);
                            article.dateStr = formatDate(article.date);
                        } else {
                            article.dateStr = '未知';
                            article.date = new Date(0);
                        }
                    }
                } catch (error) {
                    console.error(`Error fetching commits for ${article.name}:`, error);
                    article.dateStr = '未知';
                    article.date = new Date(0);
                }
            }
        }

        // 格式化日期
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 格式化文件大小
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // 排序文章
        function sortArticles(articles, sortType) {
            const sorted = [...articles];
            
            switch (sortType) {
                case 'newest':
                    sorted.sort((a, b) => (b.date || new Date(0)) - (a.date || new Date(0)));
                    break;
                case 'oldest':
                    sorted.sort((a, b) => (a.date || new Date(0)) - (b.date || new Date(0)));
                    break;
                case 'name':
                    sorted.sort((a, b) => a.title.localeCompare(b.title, 'zh-CN'));
                    break;
            }
            
            return sorted;
        }

        // 渲染文章列表
        function renderArticles() {
            const container = document.getElementById('articleList');
            const sorted = sortArticles(articles, currentSort);

            if (sorted.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p class="empty-text">暂无内容，请在 ${escapeHtml(pageConfig.repoPath)}/ 下添加 Markdown 文件</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = sorted.map((article, index) => `
                <div class="article-item" onclick="openArticle('${article.name}', '${article.title.replace(/'/g, "\\'")}')">
                    <div class="article-header">
                        <div class="article-title">${index === 0 && currentSort === 'newest' ? '✨ ' : ''}${article.title}</div>
                        ${index === 0 && currentSort === 'newest' ? '<span class="article-badge">最新</span>' : ''}
                    </div>
                    <div class="article-meta">
                        <span class="article-date">📅 ${article.dateStr || '未知'}</span>
                        <span class="article-size">📄 ${formatSize(article.size)}</span>
                    </div>
                </div>
            `).join('');
        }

        // 打开文章
        function openArticle(filename, title) {
            const params = buildSearchParams({
                file: filename,
                title: title
            });
            window.location.href = `../context/index.html?${params.toString()}`;
        }

        // 显示统计信息
        function showStats() {
            const statsDiv = document.getElementById('stats');
            const countSpan = document.getElementById('articleCount');
            countSpan.textContent = articles.length;
            statsDiv.style.display = 'block';
        }

        // 显示错误
        function showError(message) {
            const container = document.getElementById('articleList');
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">❌</div>
                    <p class="empty-text">${message}</p>
                </div>
            `;
        }

        // 排序按钮事件
        document.querySelectorAll('.sort-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentSort = e.target.dataset.sort;
                renderArticles();
            });
        });

        // Miku点击效果
        function mikuClick() {
            const miku = document.querySelector('.miku-decoration');
            const notes = ['♪', '♫', '♬', '♩'];
            
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const note = document.createElement('div');
                    note.className = 'music-note';
                    note.textContent = notes[Math.floor(Math.random() * notes.length)];
                    note.style.left = (miku.offsetLeft + 90) + 'px';
                    note.style.top = (miku.offsetTop + 30) + 'px';
                    note.style.color = ['#39C5BB', '#FFB3D9', '#B4E4FF'][Math.floor(Math.random() * 3)];
                    document.body.appendChild(note);
                    
                    setTimeout(() => note.remove(), 3000);
                }, i * 200);
            }
            
            showToast('Miku: こんにちは！(ﾉ◕ヮ◕)ﾉ*:･ﾟ✧');
        }

        // 显示 Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 页面加载时获取文章
        window.addEventListener('load', () => {
            applyPageMeta();
            fetchArticles();
            showToast(pageConfig.welcomeMessage);
        });
    </script>
</body>
</html>
